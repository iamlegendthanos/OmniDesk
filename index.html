<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OmniDesk" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#12100e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>OmniDesk — AI Business Builder</title>
    <meta name="description" content="Build a business at the speed of conversation. OmniDesk is your AI business partner." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Default dark — avoids flash of light mode */
      html { background: #12100e; color-scheme: dark; }
      body { margin: 0; padding: 0; background: #12100e; }
      #root { min-height: 100vh; }
    </style>
    <script>
      /* Immediately restore user's saved theme preference */
      try {
        const t = localStorage.getItem('omni-theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch(e) {}

      /* Register service worker for PWA */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
